<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="app-name" content="OpenRouter AI">
<meta name="app-version" content="8.5">
<meta name="app-icon" content="🧠">

<title>OpenRouter AI</title>

<!-- MATERIALIZE -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

<!-- GOOGLE ICONS -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    background:#0f0f1f;
    color:white;
    overflow:hidden;
}

/* SIDEBAR */

.sidebar{
    width:300px;
    background:#15152a;
    border-right:1px solid #2a2a40;
    display:flex;
    flex-direction:column;
}

.topbar{
    padding:10px;
    border-bottom:1px solid #2a2a40;
}

.chat-list{
    flex:1;
    overflow:auto;
}

.chat-item{
    padding:12px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.chat-item:hover{
    background:#222244;
}

/* MAIN */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

/* CHAT */

.chat{
    flex:1;
    overflow:auto;
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.msg{
    padding:12px;
    border-radius:16px;
    max-width:75%;
    white-space:pre-wrap;
}

.user{
    background:#2962ff;
    align-self:flex-end;
}

.bot{
    background:#1f1f35;
}

/* BOTTOM */

.bottom{
    padding:10px;
    border-top:1px solid #2a2a40;
    display:flex;
    gap:10px;
    align-items:center;
}

.input-field{
    flex:1;
    margin:0 !important;
}

textarea{
    color:white !important;
}

.select-dropdown{
    color:white !important;
}

.dropdown-content{
    background:#1f1f35;
}

.dropdown-content li span{
    color:white !important;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="topbar">

<a class="waves-effect waves-light btn blue"
onclick="newChat()">
<i class="material-icons left">add</i>
Chat
</a>

<br><br>

<!-- MODEL SEARCH -->

<div class="input-field">

<input
id="modelSearch"
type="text"
placeholder="Search model..."
oninput="filterModels()">

</div>

<!-- MODEL SELECTOR -->

<div class="input-field">

<select id="modelSelect"></select>

</div>

</div>

<!-- CHAT LIST -->

<div id="chatList" class="chat-list"></div>

</div>

<!-- MAIN -->

<div class="main">

<!-- CHAT -->

<div id="chat" class="chat"></div>

<!-- INPUT -->

<div class="bottom">

<a class="btn green"
id="voiceBtn"
onclick="toggleVoice()">
🎤
</a>

<div class="input-field">

<textarea
id="input"
class="materialize-textarea"
placeholder="Message..."
onkeydown="handleKey(event)">
</textarea>

</div>

<a class="btn blue" onclick="send()">
Send
</a>

<a class="btn orange" onclick="speakLast()">
🔊
</a>

</div>

</div>

<script>

/* ================= CONFIG ================= */

const WORKER =
"https://ai.thcorporation8.workers.dev";

/* ================= STATE ================= */

let chats = {};
let current = null;
let models = [];

/* ================= INIT ================= */

document.addEventListener("DOMContentLoaded", async()=>{

    M.AutoInit();

    await loadModels();

    newChat();

});

/* ================= MODELS ================= */

async function loadModels(){

    try{

        const res = await fetch(WORKER);

        models = await res.json();

        renderModels(models);

    }catch(e){

        console.error(e);

        M.toast({
            html:"Failed to load models"
        });

    }

}

function renderModels(list){

    const select =
        document.getElementById("modelSelect");

    select.innerHTML = "";

    list.forEach(m=>{

        const option =
            document.createElement("option");

        option.value = m.id;

        option.textContent = m.id;

        select.appendChild(option);

    });

    M.FormSelect.init(select);

}

function filterModels(){

    const q =
        document.getElementById("modelSearch")
        .value
        .toLowerCase();

    const filtered = models.filter(m=>
        m.id.toLowerCase().includes(q)
    );

    renderModels(filtered);

}

/* ================= CHAT ================= */

function newChat(){

    const id = "chat_" + Date.now();

    chats[id] = {
        id,
        name:"New Chat",
        messages:[]
    };

    current = id;

    renderChats();

    renderChat();

}

function renderChats(){

    const list =
        document.getElementById("chatList");

    list.innerHTML = "";

    Object.values(chats).forEach(c=>{

        const div =
            document.createElement("div");

        div.className = "chat-item";

        div.innerHTML = `
            <b>${c.name}</b>
        `;

        div.onclick=()=>{
            current=c.id;
            renderChat();
        };

        list.appendChild(div);

    });

}

function renderChat(){

    const chat =
        document.getElementById("chat");

    chat.innerHTML = "";

    chats[current].messages.forEach(m=>{

        const div =
            document.createElement("div");

        div.className =
            "msg " + m.role;

        div.textContent =
            m.text;

        chat.appendChild(div);

    });

}

/* ================= ADD ================= */

function add(role,text){

    chats[current].messages.push({
        role,text
    });

    renderChat();

}

/* ================= SEND ================= */

async function send(){

    const input =
        document.getElementById("input");

    const text =
        input.value.trim();

    if(!text) return;

    input.value="";

    add("user",text);

    const chat =
        document.getElementById("chat");

    const bot =
        document.createElement("div");

    bot.className="msg bot";

    bot.textContent="";

    chat.appendChild(bot);

    const model =
        document.getElementById("modelSelect")
        .value;

    const messages =
        chats[current].messages.map(m=>({
            role:m.role,
            content:m.text
        }));

    const res = await fetch(WORKER,{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            model,
            messages
        })

    });

    const reader =
        res.body.getReader();

    const decoder =
        new TextDecoder();

    let buffer="";
    let full="";

    while(true){

        const {value,done} =
            await reader.read();

        if(done) break;

        buffer += decoder.decode(
            value,
            {stream:true}
        );

        const lines =
            buffer.split("\n");

        buffer = lines.pop();

        for(const line of lines){

            if(line.startsWith("data:")){

                const json =
                    line.replace("data:","")
                    .trim();

                if(json==="[DONE]")
                    continue;

                try{

                    const parsed =
                        JSON.parse(json);

                    const token =
                        parsed.choices?.[0]
                        ?.delta?.content;

                    if(token){

                        full += token;

                        bot.textContent = full;

                        chat.scrollTop =
                            chat.scrollHeight;

                    }

                }catch(e){}

            }

        }

    }

    add("bot",full);

}

/* ================= KEY ================= */

function handleKey(e){

    if(e.key==="Enter" && !e.shiftKey){

        e.preventDefault();

        send();

    }

}

/* ================= VOICE ================= */

let recognition;
let listening=false;

function initVoice(){

    const SR =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if(!SR){

        M.toast({
            html:"Speech unsupported"
        });

        return;

    }

    recognition = new SR();

    recognition.lang="en-US";

    recognition.onresult=(e)=>{

        document.getElementById("input")
        .value =
        e.results[0][0].transcript;

        send();

    };

    recognition.onend=()=>{

        listening=false;

        document.getElementById("voiceBtn")
        .classList.remove("red");

    };

}

function toggleVoice(){

    if(!recognition)
        initVoice();

    if(!recognition)
        return;

    if(!listening){

        recognition.start();

        listening=true;

        document.getElementById("voiceBtn")
        .classList.add("red");

    }else{

        recognition.stop();

    }

}

/* ================= TTS ================= */

function speak(text){

    const u =
        new SpeechSynthesisUtterance(text);

    u.lang="en-US";

    speechSynthesis.speak(u);

}

function speakLast(){

    const last =
        chats[current].messages
        .slice()
        .reverse()
        .find(m=>m.role==="bot");

    if(last)
        speak(last.text);

}

</script>

</body>
</html>
